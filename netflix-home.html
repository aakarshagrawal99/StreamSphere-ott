<!DOCTYPE html>
<html>
<head>
<title>Netflix Home</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    overflow-x: hidden;
    font-family: Arial;
}

/* 🔥 HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
}

/* logo */
.logo {
    color: red;
    font-size: 20px;
    font-weight: bold;
}

/* search */
.search input {
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    outline: none;
    width: 220px;
}

/* 🔥 SECTION */
.section {
    margin: 20px;
}

.section h2 {
    margin-bottom: 10px;
}

/* 🔥 ROW */
.row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* hide scrollbar */
.row::-webkit-scrollbar {
    display: none;
}

/* 🔥 MOVIE CARD */
.movie {
    min-width: 180px;
    height: 260px;
    border-radius: 12px;
    overflow: hidden;   /* 🔥 important */
    cursor: pointer;
    transition: 0.3s;
    background: black;  /* fallback */
}

.movie img {
    width: 100%;
    height: 100%;
    object-fit: cover;  /* 🔥 MOST IMPORTANT */
    display: block;
}

/* hover effect */
.movie:hover {
    transform: scale(1.1);
}

.search {
  position: relative;
}

#clearSearch {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: black;
  cursor: pointer;
  font-size: 14px;
}

#searchResults {
  position: fixed;
  top: 70px;
  left: 0;
  width: 100%;
  height: calc(100vh - 70px);
  overflow-y: auto;
  overflow-x: hidden;   /* 🔥 IMPORTANT */
  background: black;
  z-index: 999;
}

#searchResults img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      margin-bottom: 10px;
      border-radius: 6px;
}

#resultRow {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px 40px;
}

#resultRow .movie {
  width: 180px;          /* same as homepage */
  height: 260px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  cursor: pointer;
}

#resultRow .movie img {
  width: 100%;
  height: 100%;
  object-fit: cover;     /* IMPORTANT */
  border-radius: 12px;
}

#searchResults h2 {
  margin-bottom: 20px;
}
</style>

</head>

            top:-30px;

            color:white;
            font-size:30px;
            cursor:pointer;
        ">✖</span>

        <!-- YOUTUBE IFRAME -->
        <iframe id="trailerFrame"

            height="500"

            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>

<script>

// 🎬 EXISTING TRAILER FUNCTION (UNCHANGED)
function playTrailer(videoId) {
  const popup = document.getElementById("trailerPopup");
  const frame = document.getElementById("trailerFrame");

  frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
  popup.style.display = "flex";
}

function closeTrailer() {
  const popup = document.getElementById("trailerPopup");
  const frame = document.getElementById("trailerFrame");

  frame.src = "";
  popup.style.display = "none";
}


// 🔍 IMPROVED SEARCH FUNCTION
const searchBar = document.getElementById("searchBar");
const resultBox = document.getElementById("searchResults");
const resultRow = document.getElementById("resultRow");

searchBar.addEventListener("input", function () {
  const input = this.value.trim().toLowerCase();

  // clear previous results completely
  resultRow.innerHTML = "";

  // if empty → go back to homepage
  if (input === "") {
    resultBox.style.display = "none";

    document.querySelectorAll(".section").forEach(sec => {
      sec.style.display = "block";
    });

    return;
  }

  const movies = document.querySelectorAll(".movie");

  let seen = new Set(); // ✅ prevents duplicates

  movies.forEach(movie => {
    const title = movie.getAttribute("data-title");

    if (title && title.toLowerCase().includes(input)) {

      // ✅ avoid duplicates
      if (!seen.has(title)) {
        seen.add(title);

        const clone = movie.cloneNode(true);
        resultRow.appendChild(clone);
      }
    }
  });

  // show results
  resultBox.style.display = "block";

  // hide homepage sections
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });
});
const clearBtn = document.getElementById("clearSearch");

clearBtn.onclick = () => {
  searchBar.value = "";
  resultRow.innerHTML = "";
  resultBox.style.display = "none"; 

  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "block";
  });
};


</script>
</body>
