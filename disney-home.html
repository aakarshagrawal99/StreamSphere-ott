<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
     overflow-x: hidden;
    /* DISNEY+ DARK BLUE (same as your image) */
    background: #021b4e;
}

/* ===== OVERLAY ===== */
.overlay {
    background: rgba(0,0,0,0.5);
    min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    color: #00A8E1;
    font-size: 28px;
    font-weight: bold;
}

.search {
    position: relative;
}

#searchBar {
  padding: 10px 40px 10px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
  width: 250px;
}

/* Clear button */
#clearSearch {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: black;
  cursor: pointer;
  font-size: 14px;
}

/* SEARCH RESULTS FULL PAGE */
#searchResults {
  display: none;
  position: fixed;   /* 🔥 IMPORTANT */
  top: 80px;         /* height of header */
  left: 0;
  width: 100%;
  height: calc(100vh - 80px);
  overflow-y: auto;  /* scroll only inside search */
  padding: 20px 40px;
  box-sizing: border-box;
  background: linear-gradient(to bottom, #0c111b, #090b13);
  z-index: 999;      /* 🔥 stays above homepage */
}

/* Movie row */
.movie-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  width: 100%;
}

body.search-active {
    overflow: hidden;
    height: 100vh;
}
body.search-active .section {
  display: none;
}

/* ===== CATEGORY ===== */
.category {
    margin: 25px;
}

.category h2 {
    color: white;
    margin-bottom: 10px;
}

/* ===== ROW ===== */
.row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* ===== CARD ===== */
.movie {
    min-width: 180px;
    height: 260px;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.movie img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    
}

.movie:hover {
    transform: scale(1.08);
}

/* ===== SCROLLBAR HIDE ===== */
.row::-webkit-scrollbar {
    display: none;
}

</style>
</head>

<!-- TRAILER POPUP -->
<div id="trailerPopup" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
">

    <div style="position:relative; width:80%; max-width:900px;">
        
        <!-- CLOSE BUTTON -->
        <span onclick="closeTrailer()" style="
            position:absolute;
            top:-30px;
            right:0;
            color:white;
            font-size:30px;
            cursor:pointer;
        ">✖</span>

        <!-- YOUTUBE IFRAME -->
        <iframe id="trailerFrame"
            width="100%"
            height="500"
            src=""
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

</div>
<script>
function playTrailer(videoId) {
    const popup = document.getElementById("trailerPopup");
    const frame = document.getElementById("trailerFrame");

    frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    popup.style.display = "flex";
}

function closeTrailer() {
    const popup = document.getElementById("trailerPopup");
    const frame = document.getElementById("trailerFrame");

    frame.src = ""; // stop video
    popup.style.display = "none";
}

const searchBar = document.getElementById("searchBar");
const clearBtn = document.getElementById("clearSearch");

searchBar.addEventListener("input", function () {

  let input = this.value.toLowerCase().trim();
  if (input === "") {
    document.body.classList.remove("search-active");
  } else {
    document.body.classList.add("search-active");
  }

  let movies = document.querySelectorAll(".movie");

  let resultBox = document.getElementById("searchResults");
  let resultRow = document.getElementById("resultRow");

  resultRow.innerHTML = "";

  if (input === "") {
    resultBox.style.display = "none";

    return;
  }

  let addedTitles = new Set(); // 🔥 prevents duplicates

  movies.forEach(movie => {
    let title = movie.getAttribute("data-title");

    if (title && title.toLowerCase().includes(input)) {

      if (!addedTitles.has(title)) {

        let clone = movie.cloneNode(true);
        resultRow.appendChild(clone);

        addedTitles.add(title);
      }
    }
  });

  resultBox.style.display = "block";

  // 🔥 hide homepage completely
 if (input === "") {
  // show homepage
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "block";
  });
} else {
  // hide homepage completely
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });
}

});

clearBtn.onclick = () => {

  searchBar.value = "";

  document.getElementById("searchResults").style.display = "none";

  document.body.classList.remove("search-active");

  clearBtn.style.display = "none";
};

</script>
