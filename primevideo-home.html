<!DOCTYPE html>

<title>Prime Video</title>

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    /* MATCH YOUR IMAGE COLOR */
    background: #0f1c2e;
}

/* ===== OVERLAY ===== */
.overlay {
    width: 100%;
    background: rgba(0,0,0,0.5);
    min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    color: #00A8E1;
    font-size: 20px;
    font-weight: bold;
}

.search {
    position: relative;
}

/* ===== CATEGORY ===== */
.category {
    margin: 25px;
}

.category h2 {
    color: white;
    margin-bottom: 10px;
}

/* ===== ROW ===== */
.row {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* ===== CARDS ===== */
.movie {
    min-width: 160px;
    height: 260px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.movie img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 10px;
}

/* ===== HOVER ===== */
.movie:hover {
    transform: scale(1.1);
}

/* ===== SCROLLBAR HIDE ===== */
.row::-webkit-scrollbar {
    display: none;
}

#searchResults {
  display: none;
  position: fixed;   /* 🔥 makes it separate layer */
  top: 70px;         /* adjust to your header height */
  left: 0;
  width: 100%;
  height: calc(100vh - 70px);
  overflow-y: auto;  /* scroll only inside search */
  padding: 20px 40px;
  box-sizing: border-box;
  background: #0f1c2e;  /* Prime Video style */
  z-index: 999;
}

#searchResults img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      margin-bottom: 10px;
      border-radius: 6px;
}

body.search-active {
  overflow: hidden;
}

#searchResults h2 {
  margin-bottom: 20px;
}

#resultRow {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  align-items: start;
}

#resultRow .movie {
  width: 180px;
  height: 260px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  cursor: pointer;
}

#resultRow .movie img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

#searchBar {
  padding: 10px 35px 10px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
  width: 250px;
}

#clearSearch {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 14px;
}


</style>

<script>
function playTrailer(videoId) {
    const popup = document.getElementById("trailerPopup");
    const frame = document.getElementById("trailerFrame");

    frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    popup.style.display = "flex";
}

function closeTrailer() {
    const popup = document.getElementById("trailerPopup");
    const frame = document.getElementById("trailerFrame");

    frame.src = ""; // stop video
    popup.style.display = "none";
}

// 🔍 SEARCH LOGIC (PRIME VIDEO)

const searchBar = document.getElementById("searchBar");
const clearBtn = document.getElementById("clearSearch");

const resultBox = document.getElementById("searchResults");
const resultRow = document.getElementById("resultRow");

searchBar.addEventListener("input", function () {

  const input = this.value.trim().toLowerCase();
  const movies = document.querySelectorAll(".movie");

  // clear previous results
  resultRow.innerHTML = "";

  if (input === "") {

    resultBox.style.display = "none";

    // show homepage again
    document.querySelectorAll(".section").forEach(sec => {
      sec.style.display = "block";
    });

    // 🔥 allow scroll again
    document.body.classList.remove("search-active");

    return;
  }

  let seen = new Set();
  let found = 0;

  movies.forEach(movie => {

    const title = movie.getAttribute("data-title");

    if (title && title.toLowerCase().includes(input)) {

      if (!seen.has(title)) {
        seen.add(title);

        const clone = movie.cloneNode(true);
        resultRow.appendChild(clone);

        found++;
      }
    }
  });

  resultBox.style.display = found > 0 ? "block" : "none";

  // 🔥 hide homepage completely
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });

  // 🔥 stop background scroll
  document.body.classList.add("search-active");

});


// ❌ CLEAR BUTTON
clearBtn.onclick = () => {

  searchBar.value = "";
  resultRow.innerHTML = "";

  resultBox.style.display = "none";

  // show homepage again
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "block";
  });

  // 🔥 enable scroll again
  document.body.classList.remove("search-active");
};
</script>
