<!DOCTYPE html>
<html>
<head>
    <title>Select Platform</title>

    <style>
        body {
    margin: 0;
    background: url("assets/movie.jpg") no-repeat center center/cover;
    font-family: Arial;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* container */
.platform-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* BIG RECTANGLE CARDS 🔥 */
.card {
    width: 380px;
    height: 220px;
    border-radius: 20px; /* curved corners */
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,0.5);
    cursor: pointer;

    opacity: 0;
    transform: translateY(60px);
    transition: 0.6s;
}

/* IMAGE FIX (MOST IMPORTANT) */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* shows full logo */
}

/* animation */
.card.show {
    opacity: 1;
    transform: translateY(0);
}

/* hover */
.card:hover {
    transform: scale(1.08);
}
    </style>
</head>

<body>

<div class="overlay">
    
    <div id="cards" class="platform-container">

        <div class="card" id="netflix">
            <img src="netflix.jpeg">
        </div>

        <div class="card" id="primevideo">
            <img src="primevideo.jpeg">
        </div>

        <div class="card" id="disney">
            <img src="disney.jpeg">
        </div>

    </div>
</div>

<script>
    const cards = document.querySelectorAll(".card");

    // show one by one
    cards.forEach((card, index) => {
        setTimeout(() => {
            card.classList.add("show");
        }, index * 700); // delay
    });

    // navigation
        document.getElementById("netflix").onclick = () => {
        window.location.href = "netflix.html";
    };

        document.getElementById("primevideo").onclick = () => {
        window.location.href = "primevideo.html";
    };

        document.getElementById("disney").onclick = () => {
        window.location.href = "disney.html";
    };
</script>

</body>
</html>
